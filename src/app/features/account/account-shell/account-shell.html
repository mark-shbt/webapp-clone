<div class="account-shell container py-4">
  <h2 class="fw-bold mb-4">My Account</h2>

  <div class="row g-4">
    <!-- Sidebar tabs -->
    <div class="col-12 col-md-3">
      <div class="list-group">
        <a routerLink="profile" routerLinkActive="active" class="list-group-item list-group-item-action d-flex align-items-center gap-2">
          <i class="bi bi-person"></i> Profile
        </a>
        <a routerLink="addresses" routerLinkActive="active" class="list-group-item list-group-item-action d-flex align-items-center gap-2">
          <i class="bi bi-geo-alt"></i> Addresses
        </a>
        <a routerLink="payment-methods" routerLinkActive="active" class="list-group-item list-group-item-action d-flex align-items-center gap-2">
          <i class="bi bi-credit-card"></i> Payment Methods
        </a>
        <a routerLink="order-history" routerLinkActive="active" class="list-group-item list-group-item-action d-flex align-items-center gap-2">
          <i class="bi bi-bag"></i> Order History
        </a>
        <a routerLink="allowance" routerLinkActive="active" class="list-group-item list-group-item-action d-flex align-items-center gap-2">
          <i class="bi bi-wallet2"></i> Expense Budgets
        </a>
        <a routerLink="favorites" routerLinkActive="active" class="list-group-item list-group-item-action d-flex align-items-center gap-2">
          <i class="bi bi-heart"></i> Favorites
        </a>
      </div>
    </div>

    <!-- Content -->
    <div class="col-12 col-md-9">
      <router-outlet />
    </div>
  </div>
</div>
